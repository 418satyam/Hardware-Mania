<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hardware Mania</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Background -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="assets/bg-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- HOME -->
<section class="page active" id="home">
  <img src="assets/college-logo.jpg" class="logo">
  <h2 class="college">Ramanand Arya D.A.V College (Autonomous)</h2>

  <h1 class="event">
    HARDWARE<br><span>MANIA</span>
  </h1>

  <div class="coordinators">
    <p><strong>Event In-Charge</strong></p>
    <p>Swati Kemkar</p>
    <p>Suvarna Mali</p>
  </div>
</section>

<!-- HANDLERS -->
<section class="page" id="handlers">
  <h1 class="title">EVENT HANDLERS</h1>

  <div class="hierarchy">
    <h3>Event Head</h3>
    <div class="card">
      <img src="assets/handlers/h1.jpg">
      <p>Name 1</p>
    </div>

    <h3>Assistants</h3>
    <div class="grid">
      <div class="card"><img src="assets/handlers/h2.jpg"><p>Name 2</p></div>
      <div class="card"><img src="assets/handlers/h3.jpg"><p>Name 3</p></div>
    </div>

    <h3>Volunteers</h3>
    <div class="grid">
      <div class="card"><img src="assets/handlers/h4.jpg"><p>Name 4</p></div>
      <div class="card"><img src="assets/handlers/h5.jpg"><p>Name 5</p></div>
      <div class="card"><img src="assets/handlers/h6.jpg"><p>Name 6</p></div>
    </div>
  </div>
</section>

<!-- RESULT -->
<section class="page" id="result">
  <h1 class="title">QUALIFIED PARTICIPANTS</h1>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>College</th>
        </tr>
      </thead>
      <tbody id="resultList">
        <tr><td colspan="2">Results coming soon</td></tr>
      </tbody>
    </table>
  </div>
</section>

<!-- TABS -->
<nav class="tabs">
  <button onclick="showPage('home')" class="active">Home</button>
  <button onclick="showPage('handlers')">Handlers</button>
  <button onclick="showPage('result')">Result</button>
</nav>

<script src="script.js"></script>
</body>
</html>
